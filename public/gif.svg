<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- Green Owl (like Duolingo) -->
  <g class="float">
    <circle cx="250" cy="150" r="40" fill="#5ac18e"/>
    <circle cx="235" cy="140" r="10" fill="#fff"/>
    <circle cx="265" cy="140" r="10" fill="#fff"/>
    <circle cx="235" cy="140" r="5" fill="#000"/>
    <circle cx="265" cy="140" r="5" fill="#000"/>
    <path d="M235 170 Q250 180 265 170" stroke="#fbb13c" stroke-width="5" fill="none"/>
  </g>

  <!-- Small Character -->
  <g class="float" transform="translate(100,300)">
    <circle r="15" fill="#f9c"/>
    <circle cx="-5" cy="-5" r="3" fill="#000"/>
    <circle cx="5" cy="-5" r="3" fill="#000"/>
    <path d="M-5 5 Q0 10 5 5" stroke="#000" stroke-width="1" fill="none"/>
  </g>

  <!-- More characters can be added similarly -->
  
  <style>
    .float {
      animation: floatAnim 3s ease-in-out infinite alternate;
      transform-origin: center;
    }

    @keyframes floatAnim {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }
  </style>
</svg>